name: axon_intelligence
description: "Axon Intelligence - AI-powered Freelancing Marketplace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  dartz: ^0.10.1
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking (for future)
  dio: ^5.8.0+1

  # Local Storage (for future)
  shared_preferences: ^2.5.3

  # Icons
  cupertino_icons: ^1.0.8

  # Auth
  google_sign_in: ^6.2.2
  uuid: ^4.4.0
  url_launcher: ^6.3.1
  timeago: ^3.7.1
  image_picker: ^1.2.3
  intl: ^0.19.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/onboarding/
    - assets/portfolio/
